syntax = "proto3";

package ledger;

option go_package = "./proto/ledger";

service LedgerService {

  rpc CreateLedgerEntries (
    CreateLedgerEntriesRequest
  ) returns (
    CreateLedgerEntriesResponse
  );

}

message CreateLedgerEntriesRequest {
  string transaction_id = 1;
  int64 amount = 2;
}

message CreateLedgerEntriesResponse {
  string message = 1;
}